<!DOCTYPE html>
<html lang="en" data-theme="blue-gold">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Login - School Access Portal</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>

  <!-- Header Nav -->
  <header class="public-header">
    <nav class="nav-container">
      <div class="school-branding">
        <img id="public-logo" class="school-logo" src="https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=150&auto=format&fit=crop&q=80" alt="School Logo">
        <span id="public-school-name" class="school-name">Apex Integrated School</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About Us</a></li>
        <li><a href="transparency.html" class="nav-link">Transparency Board</a></li>
        <li><a href="contact.html" class="nav-link">Contact Us</a></li>
        <li><a href="login.html" class="btn-portal active" style="color:white;">Login Portal</a></li>
      </ul>
    </nav>
  </header>

  <main class="public-main">
    <section id="view-login" style="max-width:400px; margin: 4rem auto;">
      <div class="news-card">
        <div style="text-align:center; margin-bottom:1.5rem;">
          <h2 class="school-name">School Portal Login</h2>
          <p style="font-size:0.85rem; color:var(--text-secondary)">Access schedules, attendance, & school systems</p>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" class="form-control" placeholder="admin@school.edu" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn-action" style="width:100%;">Sign In</button>
        </form>

        <div style="margin-top:1.5rem; border-top: 1px solid var(--border-color); padding-top:1.25rem;">
          <label style="font-weight:600; font-size:0.85rem; text-align:center; display:block; margin-bottom:0.75rem; color:var(--text-secondary)">Quick Login (Bypass password for testing):</label>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;">
            <button type="button" class="btn-secondary quick-login-btn" data-email="admin@school.edu" style="padding:0.5rem; font-size:0.8rem; text-align:center;">Admin Portal</button>
            <button type="button" class="btn-secondary quick-login-btn" data-email="teacher@school.edu" style="padding:0.5rem; font-size:0.8rem; text-align:center;">Teacher Portal</button>
            <button type="button" class="btn-secondary quick-login-btn" data-email="parent@school.edu" style="padding:0.5rem; font-size:0.8rem; text-align:center;">Parent Portal</button>
            <button type="button" class="btn-secondary quick-login-btn" data-email="learner@school.edu" style="padding:0.5rem; font-size:0.8rem; text-align:center;">Learner Portal</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast">Action completed successfully!</div>

  <script type="module" src="app.js"></script>
</body>
</html>
