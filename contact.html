<!DOCTYPE html>
<html lang="en" data-theme="blue-gold">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect With Us - Directory & Contacts</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>

  <!-- Header Nav -->
  <header class="public-header">
    <nav class="nav-container">
      <div class="school-branding">
        <img id="public-logo" class="school-logo" src="https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=150&auto=format&fit=crop&q=80" alt="School Logo">
        <span id="public-school-name" class="school-name">Apex Integrated School</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About Us</a></li>
        <li><a href="transparency.html" class="nav-link">Transparency Board</a></li>
        <li><a href="contact.html" class="nav-link active">Contact Us</a></li>
        <li><a href="login.html" class="btn-portal" style="color:white;">Login Portal</a></li>
      </ul>
    </nav>
  </header>

  <main class="public-main">
    <section id="view-contact">
      <h1 class="hero-title" style="text-align:center; margin-bottom:3rem;">Connect With Us</h1>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:3rem;">
        <div class="news-card">
          <h2 class="widget-title">Inquiry Form</h2>
          <form id="contact-form">
            <div class="form-group">
              <label>Name</label>
              <input type="text" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea class="form-control" rows="4" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" class="btn-action">Send Inquiry</button>
          </form>
        </div>
        <div>
          <div class="sidebar-widget">
            <h3>Office Directory</h3>
            <p style="margin:1rem 0; color:var(--text-secondary);"><strong>Registrar:</strong> registrar@school.edu</p>
            <p style="color:var(--text-secondary); margin-bottom:2rem;"><strong>Principal:</strong> principal@school.edu</p>
            <h3>Location</h3>
            <p style="color:var(--text-secondary);">123 Academic Way, Manila, Philippines</p>
            <div style="margin-top:1rem; height:200px; background:#e2e8f0; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:var(--text-secondary)">
              [Map Placeholder - Manila, PH]
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
